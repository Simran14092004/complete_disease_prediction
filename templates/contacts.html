<!-- Contact.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/templates/static/style.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #AFDDE5;
            color: #003135;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
        }

        .container {
            background-color: #fff;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 400px;
            max-width: 90%;
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            color: #003135;
            margin-bottom: 2rem;
            text-align: center;
            font-size: 2rem;
        }

        .contact-info {
            width: 100%;
            margin-bottom: 2rem;
        }

        .contact-info h3 {
            color: #0FA4AF;
            margin-bottom: 1rem;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .contact-info ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .contact-info li {
            display: flex;
            align-items: center;
            margin-bottom: 0.75rem;
            font-size: 1rem;
        }

        .contact-info i {
            margin-right: 0.75rem;
            color: #003135;
            font-size: 1.2rem;
        }

        .social-media {
            width: 100%;
        }

        .social-media h3 {
            color: #0FA4AF;
            margin-bottom: 1rem;
            font-size: 1.2rem;
            font-weight: 600;
            text-align: center;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 0;
        }

        .social-icons a {
            color: #003135;
            font-size: 1.5rem;
            transition: color 0.3s ease;
        }

        .social-icons a:hover {
            color: #0FA4AF;
        }
        .form-group {
            width: 100%;
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #003135;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #0FA4AF;
        }

        .form-group textarea {
            resize: vertical;
            height: 100px;
        }

        .submit-button {
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 5px;
            background-color: #0FA4AF;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .submit-button:hover {
            background-color: #008080;
        }


        @media (max-width: 450px) {
            .container {
                padding: 1.5rem;
            }
            .social-icons {
                gap: 1rem;
            }
            .social-icons a {
                font-size: 1.2rem;
            }
            h2{
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Contact Us</h2>
        <div class="contact-info">
            <h3>Our Contact</h3>
            <ul>
                <li><i class="fas fa-map-marker-alt"></i> Address: Varanasi, Uttar Pradesh</li>
                <li><i class="fas fa-phone"></i> Phone: +91 456xx xxxxx</li>
                <li><i class="fas fa-envelope"></i> Email: info@healthplatform.com</li>
                <li><i class="fab fa-whatsapp"></i> WhatsApp: +91 256xx xxxxx</li>
            </ul>
        </div>
        <div class="social-media">
            <h3>Our Social Media Handles</h3>
            <div class="social-icons">
                <a href="#" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
                <a href="#" title="GitHub"><i class="fab fa-github"></i></a>
                <a href="#" title="Instagram"><i class="fab fa-instagram"></i></a>
                <a href="#" title="Facebook"><i class="fab fa-facebook"></i></a>
            </div>
        </div>
        <form class="contact-form">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your Name">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Your Email">
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Your Message"></textarea>
            </div>
            <button type="submit" class="submit-button">Send Message</button>
        </form>
    </div>
    <script src="/templates/static/script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</body>
</html>
