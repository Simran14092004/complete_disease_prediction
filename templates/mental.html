<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depression Prediction</title>
    
    <!-- Fonts & Styles -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: url('templates/static/images/4.jpg') no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            padding: 0;
            color: #003135;
        }

        .container {
            background: rgba(31, 42, 54, 0.85); /* 85% opaque */
            max-width: 900px;
            margin: 60px auto;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        h2 {
            text-align: center;
            font-weight: 700;
            margin-bottom: 30px;
            color: #003135;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            font-weight: 600;
            color: #0FA4AF;
            display: block;
            margin-bottom: 8px;
        }

        input, select {
            width: 100%;
            padding: 10px 14px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 10px;
            background-color: #f8f8f8;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: #0FA4AF;
            outline: none;
            box-shadow: 0 0 0 3px rgba(15, 164, 170, 0.2);
        }

        .submit-button {
            display: block;
            width: 100%;
            padding: 14px;
            background-color: #003135;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            border: none;
            border-radius: 10px;
            transition: background 0.3s ease;
            margin-top: 30px;
        }

        .submit-button:hover {
            background-color: #0FA4AF;
        }

        #results, .recommendations {
            margin-top: 40px;
            padding: 20px;
            background-color: #AFDDE5;
            border-radius: 12px;
        }

        #results h3, .recommendations h3 {
            color: #d3011c;
            font-weight: 700;
        }

        ul {
            padding-left: 20px;
        }

        ul li {
            margin-bottom: 8px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Student Depression Prediction</h2>
        <form id="depressionForm" method="POST" action="/mental">
            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" name="Age" placeholder="Your Age" required>
            </div>
            <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender" name="Gender" required>
                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
            <div class="form-group">
                <label for="profession">Profession</label>
                <input type="text" id="profession" name="Profession" placeholder="Your Profession" required>
            </div>
            <div class="form-group">
                <label for="academic_pressure">Academic Pressure (0-10)</label>
                <input type="number" id="academic_pressure" name="Academic Pressure" min="0" max="10" placeholder="Academic Pressure" required>
            </div>
            <div class="form-group">
                <label for="work_pressure">Work Pressure (0-10)</label>
                <input type="number" id="work_pressure" name="Work Pressure" min="0" max="10" placeholder="Work Pressure" required>
            </div>
            <div class="form-group">
                <label for="cgpa">CGPA</label>
                <input type="number" id="cgpa" name="CGPA" step="0.01" placeholder="Your CGPA" required>
            </div>
            <div class="form-group">
                <label for="study_satisfaction">Study Satisfaction (0-5)</label>
                <input type="number" id="study_satisfaction" name="Study Satisfaction" min="0" max="5" placeholder="Study Satisfaction" required>
            </div>
            <div class="form-group">
                <label for="job_satisfaction">Job Satisfaction (0-5)</label>
                <input type="number" id="job_satisfaction" name="Job Satisfaction" min="0" max="5" placeholder="Job Satisfaction" required>
            </div>
            <div class="form-group">
                <label for="sleep_duration">Sleep Duration</label>
                <select id="sleep_duration" name="Sleep Duration" required>
                    <option value="">Select</option>
                    <option value="Less than 5 hours">Less than 5 hours</option>
                    <option value="5-6 hours">5-6 hours</option>
                    <option value="7-8 hours">7-8 hours</option>
                    <option value="More than 8 hours">More than 8 hours</option>
                </select>
            </div>
            <div class="form-group">
                <label for="dietary_habits">Dietary Habits</label>
                <select id="dietary_habits" name="Dietary Habits" required>
                    <option value="">Select</option>
                    <option value="Unhealthy">Unhealthy</option>
                    <option value="Moderate">Moderate</option>
                    <option value="Healthy">Healthy</option>
                </select>
            </div>
            <div class="form-group">
                <label for="degree">Degree</label>
                <input type="text" id="degree" name="Degree" placeholder="Your Degree" required>
            </div>
            <div class="form-group">
                <label for="suicidal_thoughts">Have you ever had suicidal thoughts?</label>
                <select id="suicidal_thoughts" name="Have you ever had suicidal thoughts ?" required>
                    <option value="">Select</option>
                    <option value="No">No</option>
                    <option value="Yes">Yes</option>
                </select>
            </div>
            <div class="form-group">
                <label for="work_study_hours">Work/Study Hours</label>
                <input type="number" id="work_study_hours" name="Work/Study Hours" placeholder="Work/Study Hours" required>
            </div>
            <div class="form-group">
                <label for="financial_stress">Financial Stress (0-10)</label>
                <input type="number" id="financial_stress" name="Financial Stress" min="0" max="10" placeholder="Financial Stress" required>
            </div>
            <div class="form-group">
                <label for="family_history">Family History of Mental Illness</label>
                <select id="family_history" name="Family History of Mental Illness" required>
                    <option value="">Select</option>
                    <option value="No">No</option>
                    <option value="Yes">Yes</option>
                </select>
            </div>
            <button type="submit" class="submit-button">Predict</button>
        </form>

        {% if prediction %}
        <div id="results">
            <h3>Prediction:</h3>
            <p>{{ prediction }}</p>
        </div>
        {% endif %}

        {% if recommendations %}
        <div class="recommendations">
            <h3>Recommendations:</h3>
            <ul>
                {% for recommendation in recommendations %}
                <li>{{ recommendation }}</li>
                {% endfor %}
            </ul>
        </div>
        {% endif %}
    </div>
</body>
</html>
