<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Breast Cancer Trends</title>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <style>
    :root {
      --primary: #d3011c;
      --accent: #0FA4AF;
      --light: #AFDDE5;
      --dark: #003135;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: var(--dark);
      color: var(--light);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background-color: var(--primary);
      color: #fff;
      padding: 1.5rem 2rem;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }

    header h1 {
      margin: 0;
      font-size: 1.8rem;
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.4);
    }

    main {
      flex: 1;
      padding: 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #chart {
      width: 100%;
      max-width: 1200px;
    }

    footer {
      background-color: var(--primary);
      color: #fff;
      text-align: center;
      padding: 1rem;
      font-size: 0.9rem;
    }

    @media (max-width: 768px) {
      header h1 {
        font-size: 1.4rem;
      }

      main {
        padding: 1rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Breast Cancer Cases in India (2016–2021)</h1>
  </header>

  <main>
    <div id="chart"></div>
  </main>

  <footer>
    &copy; 2025 Breast Cancer Awareness Initiative
  </footer>

  <script>
    // Fetch the breast cancer data from the API
    fetch('/api/breast-cancer-data')
      .then(response => response.json())
      .then(data => {
        const states = data['States/UT'];
        const years = ['2016', '2017', '2018', '2019', '2020', '2021'];

        const colors = ['#d3011c', '#0FA4AF', '#AFDDE5', '#003135', '#0FA4AF', '#AFDDE5'];

        const traces = years.map((year, index) => ({
          x: states,
          y: data[year],
          name: year,
          type: 'bar',
          marker: { color: colors[index % colors.length] }
        }));

        const layout = {
          title: {
            text: 'Breast Cancer Cases by State (Grouped by Year)',
            font: { color: '#AFDDE5' }
          },
          barmode: 'group',
          plot_bgcolor: '#003135',
          paper_bgcolor: '#003135',
          font: {
            color: '#AFDDE5'
          },
          xaxis: {
            title: 'States/UT',
            tickangle: -45
          },
          yaxis: {
            title: 'Number of Cases'
          },
          legend: {
            bgcolor: '#0FA4AF',
            bordercolor: '#AFDDE5',
            borderwidth: 1
          }
        };

        Plotly.newPlot('chart', traces, layout, { responsive: true });
      })
      .catch(error => {
        console.error('Error fetching data:', error);
      });
  </script>
</body>
</html>
