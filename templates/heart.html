<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease Prediction</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
    font-family: 'Inter', sans-serif;
    background: url('templates/static/images/3.jpg') no-repeat center center fixed;
    background-size: cover;
    color: #003135;
    margin: 0;
    padding: 0;
}

        .container {
            background-color: #AFDDE5;
            padding: 30px;
            margin-top: 50px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            max-width: 800px;
        }

        h1 {
            color: #003135;
            font-weight: 700;
            margin-bottom: 20px;
        }

        label {
            font-weight: 600;
            color: #003135;
        }

        .form-control, .form-select {
            border-radius: 10px;
            padding: 10px 15px;
            border: 1px solid #ccc;
        }

        .btn-primary {
            background-color: #d3011c;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #a10014;
        }

        .recommendations, .mt-4 {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            margin-top: 30px;
        }

        .recommendations ul {
            padding-left: 20px;
            color: #003135;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-title {
            color: #0FA4A3;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center">❤️ Heart Disease Prediction</h1>
        <p class="text-center">Fill out the form below to assess heart disease risk.</p>
        <form action="/heart" method="POST">
            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" class="form-control" id="age" name="age" placeholder="Enter age" required>
            </div>
            <div class="form-group">
                <label for="sex">Sex</label>
                <select class="form-control" id="sex" name="sex">
                    <option value="0">Female</option>
                    <option value="1">Male</option>
                </select>
            </div>
            <div class="form-group">
                <label for="cp">Chest Pain Type</label>
                <select class="form-control" id="cp" name="cp">
                    <option value="0">Typical Angina</option>
                    <option value="1">Atypical Angina</option>
                    <option value="2">Non-Anginal Pain</option>
                    <option value="3">Asymptomatic</option>
                </select>
            </div>
            <div class="form-group">
                <label for="trestbps">Resting Blood Pressure (mm Hg)</label>
                <input type="number" class="form-control" id="trestbps" name="trestbps" placeholder="e.g. 120" required>
            </div>
            <div class="form-group">
                <label for="chol">Cholesterol (mg/dL)</label>
                <input type="number" class="form-control" id="chol" name="chol" placeholder="e.g. 200" required>
            </div>
            <div class="form-group">
                <label for="fbs">Fasting Blood Sugar</label>
                <select class="form-control" id="fbs" name="fbs">
                    <option value="0">Below 120 mg/dL</option>
                    <option value="1">Above 120 mg/dL</option>
                </select>
            </div>
            <div class="form-group">
                <label for="restecg">Resting ECG</label>
                <select class="form-control" id="restecg" name="restecg">
                    <option value="0">Normal</option>
                    <option value="1">ST-T Abnormality</option>
                    <option value="2">Left Ventricular Hypertrophy</option>
                </select>
            </div>
            <div class="form-group">
                <label for="thalach">Max Heart Rate (bpm)</label>
                <input type="number" class="form-control" id="thalach" name="thalach" placeholder="e.g. 150" required>
            </div>
            <div class="form-group">
                <label for="exang">Exercise Angina</label>
                <select class="form-control" id="exang" name="exang">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>
            <div class="form-group">
                <label for="oldpeak">ST Depression</label>
                <input type="number" step="any" class="form-control" id="oldpeak" name="oldpeak" placeholder="e.g. 2.3" required>
            </div>
            <div class="form-group">
                <label for="slope">ST Slope</label>
                <select class="form-control" id="slope" name="slope">
                    <option value="0">Upsloping</option>
                    <option value="1">Flat</option>
                    <option value="2">Downsloping</option>
                </select>
            </div>
            <div class="form-group">
                <label for="ca">Major Vessels (0–3)</label>
                <input type="number" class="form-control" id="ca" name="ca" placeholder="e.g. 2" required>
            </div>
            <div class="form-group">
                <label for="thal">Thalassemia</label>
                <select class="form-control" id="thal" name="thal">
                    <option value="0">Normal</option>
                    <option value="1">Fixed Defect</option>
                    <option value="2">Reversible Defect</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">🔍 Predict Heart Disease</button>
        </form>

        {% if prediction %}
        <div class="mt-4">
            <h2 class="form-title">Prediction Result</h2>
            <p>{{ prediction }}</p>
        </div>
        {% endif %}

        {% if recommendations %}
        <div class="recommendations">
            <h2 class="form-title">Recommendations</h2>
            <ul>
                {% for rec in recommendations %}
                <li>{{ rec }}</li>
                {% endfor %}
            </ul>
        </div>
        {% endif %}
    </div>
</body>
</html>
